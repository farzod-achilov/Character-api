<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disney Characters — Character API</title>
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
    <link rel="stylesheet" href="./css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="disnay__body">
    <div id="site-header"></div>
    <div class="disnay">
      <div class="disnay__logo-wrapper">
        <img src="./img/disney-logo.png" alt="logo" />
      </div>
      <form class="disnay__form-search" data-disney-form>
        <input
          class="input-seach disney-search"
          placeholder="search characters"
          type="text"
          name="name"
        />
        <button class="seach-btn" type="submit"></button>
      </form>
      <div class="disnay__container" data-disney></div>
      <nav
        aria-label="Disney pagination"
        class="d-flex justify-content-center my-3"
      >
        <ul data-disney-pagination class="pagination"></ul>
      </nav>
    </div>
    <script src="./js/main.js"></script>
    <script src="./js/disney.js"></script>
    <script src="./js/nav.js"></script>
  </body>
</html>
